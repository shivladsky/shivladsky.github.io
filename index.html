<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volumetrik</title>
    <link rel="icon" href="data:," />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <!-- Basic pageview tracking -->
    <script type="module">
      (async()=>{try{await fetch("https://shivlogger.shivladsky.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({event:"pageview",event_source:"volumetrik",timestamp:Math.floor(Date.now()/1e3),nonce:crypto.randomUUID(),url:location.href,user_agent:navigator.userAgent,referrer:document.referrer})})}catch(e){console.warn("Tracking failed:",e)}})();
      </script>

    <canvas id="viewportCanvas"></canvas>

    <div id="titleOverlay">Volumetrik</div>

    <!-- Menubar (always at the top) -->
    <div id="menuBar">
      <div class="menu-item">
        <button type="button" class="menu-label" id="fileMenu">File</button>
        <div class="dropdown">
          <button type="button" class="dropdown-item" id="newFile">New</button>
          <button type="button" class="dropdown-item" id="openFile">Open...</button>
          <button type="button" class="dropdown-item" id="saveFile">Save As...</button>
        </div>
      </div>

      <div class="menu-item">
        <button type="button" class="menu-label" id="editMenu">Edit</button>
        <div class="dropdown">
          <button type="button" class="dropdown-item" id="undoAction">Undo</button>
          <button type="button" class="dropdown-item" id="redoAction">Redo</button>
        </div>
      </div>

      <div class="menu-item">
        <button type="button" class="menu-label" id="viewMenu">View</button>
        <div class="dropdown">
          <button type="button" class="dropdown-item" id="toggleGrid">Voxel Grid</button>
          <button type="button" class="dropdown-item" id="jumpToTop">Jump to Top</button>
          <button type="button" class="dropdown-item" id="upOneLayer">Up One Layer</button>
          <button type="button" class="dropdown-item" id="downOneLayer">Down One Layer</button>
          <button type="button" class="dropdown-item" id="jumpToBottom">Jump to Bottom</button>
          <button type="button" class="dropdown-item" id="toggleXray">X-Ray</button>
        </div>
      </div>

      <div class="menu-item">
        <button type="button" class="menu-label" id="paletteMenu">Palette</button>
        <div class="dropdown">
          <!-- Built-in palettes get populated dynamically here from menubar.mjs -->
          <button type="button" class="dropdown-item" id="importPalette">Load From File...</button>
          <a href="https://lospec.com/palette-list" target="_blank" rel="noopener noreferrer" class="dropdown-item" id="getMorePalettes">Get More...</a>
        </div>
      </div>

      <div class="menu-item">
        <button type="button" class="menu-label" id="toolsMenu">Tools</button>
        <div class="dropdown">
          <button type="button" class="dropdown-item" id="togglePaint">Paint</button>
          <button type="button" class="dropdown-item" id="toggleFill">Fill</button>
        </div>
      </div>
    </div>

    <div id="statusBar" aria-live="polite">
      <span class="status-item">
        <span class="status-label">Grid:</span>
        <span id="gridStatusText">Visible</span>
      </span>
      <span class="status-item">
        <span class="status-label">Tool:</span>
        <span id="selectedToolText">Paint</span>
      </span>
      <span class="status-item" id="selectedModeStatus" hidden>
        <span class="status-label">Mode:</span>
        <span id="selectedModeText"></span>
      </span>
    </div>

    <div id="colorPalettePanel"></div>
    <input type="file" id="paletteFileInput" accept=".pal,.txt,.gpl,.ase,.hex" style="display: none;" />

    <script type="module" src="./assets/js/script.mjs"></script>
    <script type="module" src="./assets/js/menubar.mjs"></script>
    <script type="module" src="./assets/js/statusbar.mjs"></script>
    <script type="module" src="./assets/js/keyboard.mjs"></script>
  </body>
</html>
